<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Logo MonArtisan — Variations</title>
  <style>
    body { background: #f0f0f0; font-family: sans-serif; padding: 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 900px; margin: auto; }
    .card { background: white; border-radius: 16px; padding: 50px 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-dark { background: #111; }
    h2 { margin: 0; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>
  <h1 style="text-align:center; margin-bottom: 40px; max-width:900px; margin:0 auto 40px;">Logo MonArtisan — Variations avec maison</h1>
  <div class="grid">

    <!-- Variation A : Maison dans carré arrondi + texte style 6 -->
    <div class="card">
      <h2>Variation A — Carré arrondi</h2>
      <svg width="280" height="80" viewBox="0 0 280 80">
        <!-- Carré arrondi bleu -->
        <rect x="0" y="5" width="70" height="70" rx="16" fill="#2563EB"/>
        <!-- Maison blanche -->
        <polygon points="35,16 58,34 58,62 12,62 12,34" fill="white" opacity="0.2"/>
        <polygon points="35,12 62,32 8,32" fill="white"/>
        <rect x="26" y="42" width="18" height="20" rx="9" fill="white"/>
        <rect x="12" y="36" width="10" height="9" rx="2" fill="white" opacity="0.6"/>
        <rect x="48" y="36" width="10" height="9" rx="2" fill="white" opacity="0.6"/>
        <!-- Barre verticale orange -->
        <rect x="82" y="5" width="5" height="70" rx="2.5" fill="#F97316"/>
        <!-- Texte -->
        <text x="96" y="34" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#666">mon</text>
        <text x="94" y="63" font-family="'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#111">artisan</text>
        <!-- Point orange -->
        <circle cx="270" cy="60" r="5" fill="#F97316"/>
      </svg>
    </div>

    <!-- Variation B : Maison dans cercle + texte style 6 -->
    <div class="card">
      <h2>Variation B — Cercle</h2>
      <svg width="280" height="80" viewBox="0 0 280 80">
        <!-- Cercle -->
        <circle cx="38" cy="40" r="34" fill="#111"/>
        <!-- Maison blanche -->
        <polygon points="38,52 56,52 56,30 38,30 20,30 20,52" fill="white" opacity="0.15"/>
        <polygon points="38,14 60,30 16,30" fill="white"/>
        <rect x="30" y="36" width="16" height="16" rx="8" fill="#F97316"/>
        <!-- Barre verticale orange -->
        <rect x="82" y="5" width="5" height="70" rx="2.5" fill="#F97316"/>
        <!-- Texte -->
        <text x="96" y="34" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#666">mon</text>
        <text x="94" y="63" font-family="'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#111">artisan</text>
        <circle cx="270" cy="60" r="5" fill="#F97316"/>
      </svg>
    </div>

    <!-- Variation C : Maison encadrée trait fin + orange -->
    <div class="card">
      <h2>Variation C — Encadré trait fin</h2>
      <svg width="280" height="80" viewBox="0 0 280 80">
        <!-- Carré encadré trait fin -->
        <rect x="2" y="7" width="66" height="66" rx="14" fill="white" stroke="#111" stroke-width="2.5"/>
        <!-- Maison -->
        <polygon points="35,18 56,34 56,60 14,60 14,34" fill="#F97316" opacity="0.15"/>
        <polygon points="35,14 60,33 10,33" fill="#111"/>
        <rect x="26" y="40" width="18" height="20" rx="9" fill="#F97316"/>
        <rect x="13" y="37" width="10" height="9" rx="2" fill="#111" opacity="0.4"/>
        <rect x="47" y="37" width="10" height="9" rx="2" fill="#111" opacity="0.4"/>
        <!-- Barre verticale orange -->
        <rect x="82" y="5" width="5" height="70" rx="2.5" fill="#F97316"/>
        <!-- Texte -->
        <text x="96" y="34" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#666">mon</text>
        <text x="94" y="63" font-family="'Arial Black', sans-serif" font-size="34" font-weight="900" fill="#111">artisan</text>
        <circle cx="270" cy="60" r="5" fill="#F97316"/>
      </svg>
    </div>

    <!-- Variation D : Fond sombre -->
    <div class="card card-dark">
      <h2>Variation D — Dark</h2>
      <svg width="280" height="80" viewBox="0 0 280 80">
        <!-- Carré arrondi orange -->
        <rect x="0" y="5" width="70" height="70" rx="16" fill="#F97316"/>
        <!-- Maison blanche -->
        <polygon points="35,52 56,52 56,32 35,32 14,32 14,52" fill="white" opacity="0.2"/>
        <polygon points="35,13 60,31 10,31" fill="white"/>
        <rect x="27" y="38" width="16" height="14" rx="7" fill="white"/>
        <!-- Barre verticale blanche -->
        <rect x="82" y="5" width="5" height="70" rx="2.5" fill="white" opacity="0.4"/>
        <!-- Texte -->
        <text x="96" y="34" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#888">mon</text>
        <text x="94" y="63" font-family="'Arial Black', sans-serif" font-size="34" font-weight="900" fill="white">artisan</text>
        <circle cx="270" cy="60" r="5" fill="#F97316"/>
      </svg>
    </div>

  </div>
  <p style="text-align:center; margin-top:40px; color:#999; max-width:900px; margin:40px auto 0;">Dis-moi laquelle tu préfères, on ajuste les couleurs si besoin !</p>
</body>
</html>
