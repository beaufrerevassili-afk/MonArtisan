<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Logos MonArtisan</title>
  <style>
    body { background: #f5f5f5; font-family: sans-serif; padding: 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .card { background: white; border-radius: 16px; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card-dark { background: #111; }
    h2 { margin: 0; font-size: 14px; color: #999; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>
  <h1 style="text-align:center; margin-bottom: 40px;">Propositions Logo — MonArtisan</h1>
  <div class="grid">

    <!-- Option 1 : Maison + texte bleu/orange -->
    <div class="card">
      <h2>Option 1 — Maison</h2>
      <svg width="260" height="80" viewBox="0 0 260 80">
        <g transform="translate(8, 8)">
          <!-- Maison -->
          <polygon points="32,6 58,28 58,58 6,58 6,28" fill="#2563EB" rx="4"/>
          <polygon points="32,0 64,26 0,26" fill="#1D4ED8"/>
          <!-- Porte -->
          <rect x="24" y="38" width="16" height="20" rx="8" fill="white"/>
          <!-- Fenêtre -->
          <rect x="10" y="32" width="10" height="10" rx="2" fill="white" opacity="0.7"/>
          <rect x="44" y="32" width="10" height="10" rx="2" fill="white" opacity="0.7"/>
        </g>
        <!-- Texte -->
        <text x="80" y="35" font-family="'Georgia', serif" font-size="26" font-weight="700" fill="#1D4ED8">Mon</text>
        <text x="80" y="62" font-family="'Georgia', serif" font-size="26" font-weight="700" fill="#F97316">Artisan</text>
      </svg>
    </div>

    <!-- Option 2 : Marteau + texte moderne -->
    <div class="card">
      <h2>Option 2 — Outil</h2>
      <svg width="260" height="80" viewBox="0 0 260 80">
        <!-- Cercle fond -->
        <circle cx="40" cy="40" r="34" fill="#F97316"/>
        <!-- Marteau simplifié -->
        <g transform="translate(40,40) rotate(-35)">
          <rect x="-5" y="-22" width="10" height="28" rx="3" fill="white"/>
          <rect x="-14" y="-26" width="28" height="12" rx="4" fill="white"/>
        </g>
        <!-- Texte -->
        <text x="84" y="30" font-family="'Arial', sans-serif" font-size="13" font-weight="600" fill="#999" letter-spacing="3">MON</text>
        <text x="82" y="60" font-family="'Arial Black', sans-serif" font-size="28" font-weight="900" fill="#111">Artisan</text>
      </svg>
    </div>

    <!-- Option 3 : Badge étoile + texte élégant -->
    <div class="card">
      <h2>Option 3 — Badge</h2>
      <svg width="280" height="80" viewBox="0 0 280 80">
        <!-- Hexagone -->
        <polygon points="40,4 68,20 68,52 40,68 12,52 12,20" fill="#111"/>
        <!-- Étoile -->
        <text x="40" y="46" font-family="sans-serif" font-size="26" text-anchor="middle" fill="#F97316">★</text>
        <!-- Texte -->
        <text x="85" y="28" font-family="'Georgia', serif" font-size="14" fill="#999" letter-spacing="1">la plateforme</text>
        <text x="83" y="58" font-family="'Georgia', serif" font-size="32" font-weight="700" fill="#111">MonArtisan</text>
      </svg>
    </div>

    <!-- Option 4 : Minimaliste lettres MA -->
    <div class="card">
      <h2>Option 4 — Monogramme</h2>
      <svg width="260" height="80" viewBox="0 0 260 80">
        <!-- Fond arrondi -->
        <rect x="4" y="4" width="66" height="66" rx="16" fill="#2563EB"/>
        <!-- Lettres MA -->
        <text x="37" y="52" font-family="'Arial Black', sans-serif" font-size="36" font-weight="900" fill="white" text-anchor="middle">M</text>
        <!-- Pastille orange -->
        <circle cx="60" cy="18" r="10" fill="#F97316"/>
        <text x="60" y="23" font-family="'Arial Black', sans-serif" font-size="12" font-weight="900" fill="white" text-anchor="middle">A</text>
        <!-- Texte -->
        <text x="86" y="36" font-family="'Arial', sans-serif" font-size="22" font-weight="700" fill="#2563EB">Mon</text>
        <text x="86" y="62" font-family="'Arial', sans-serif" font-size="22" font-weight="700" fill="#111">Artisan</text>
      </svg>
    </div>

    <!-- Option 5 : Fond sombre -->
    <div class="card card-dark">
      <h2 style="color:#555">Option 5 — Dark</h2>
      <svg width="260" height="80" viewBox="0 0 260 80">
        <circle cx="40" cy="40" r="34" fill="#2563EB"/>
        <!-- Maison minimaliste -->
        <polygon points="40,14 58,30 58,54 22,54 22,30" fill="white" opacity="0.15"/>
        <polygon points="40,10 62,28 18,28" fill="white"/>
        <rect x="32" y="38" width="16" height="16" rx="8" fill="#2563EB"/>
        <!-- Texte -->
        <text x="84" y="36" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#aaa" letter-spacing="2">MON</text>
        <text x="82" y="63" font-family="'Arial Black', sans-serif" font-size="28" font-weight="900" fill="white">ARTISAN</text>
      </svg>
    </div>

    <!-- Option 6 : Simple et pro -->
    <div class="card">
      <h2>Option 6 — Simple & Pro</h2>
      <svg width="260" height="70" viewBox="0 0 260 70">
        <!-- Barre verticale orange -->
        <rect x="0" y="5" width="6" height="60" rx="3" fill="#F97316"/>
        <!-- Texte principal -->
        <text x="20" y="32" font-family="'Arial', sans-serif" font-size="18" font-weight="400" fill="#666">mon</text>
        <text x="20" y="58" font-family="'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#111">artisan</text>
        <!-- Point orange -->
        <circle cx="222" cy="55" r="5" fill="#F97316"/>
      </svg>
    </div>

  </div>

  <p style="text-align:center; margin-top:40px; color:#999;">Dis-moi quelle option tu préfères et on l'intègre dans le site !</p>
</body>
</html>
